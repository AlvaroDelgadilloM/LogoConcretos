<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="2000" viewBox="0 0 2000 2000">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2c2c2c"/>
    </linearGradient>
    <filter id="concrete" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.4
                0 0 0 0 0.4
                0 0 0 0 0.4
                0 0 0 0.18 0" result="grain"/>
      <feBlend in="SourceGraphic" in2="grain" mode="overlay"/>
    </filter>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d6d6d"/>
      <stop offset="45%" stop-color="#404040"/>
      <stop offset="100%" stop-color="#232323"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8b2b"/>
      <stop offset="100%" stop-color="#f36518"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="20" dy="30" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="2000" height="2000" fill="url(#bgGrad)" filter="url(#concrete)"/>

  <g font-family="Montserrat, Arial, sans-serif" filter="url(#shadow)">
    <text x="1110" y="940" font-size="160" font-weight="800" fill="url(#metal)" letter-spacing="8">NARVAEZ</text>

    <text x="420" y="1180" font-size="250" font-weight="900" fill="url(#orange)" letter-spacing="4">CO</text>

    <g transform="translate(940,860)">
      <polygon points="80,0 160,120 115,120 115,420 45,420 45,120 0,120" fill="url(#metal)"/>
      <polygon points="80,145 170,275 125,275 125,575 35,575 35,275 -10,275" fill="url(#orange)"/>
      <polygon points="80,300 160,420 115,420 115,720 45,720 45,420 0,420" fill="url(#metal)"/>
    </g>

    <text x="1125" y="1180" font-size="250" font-weight="900" fill="url(#orange)" letter-spacing="4">CRETOS</text>
  </g>
</svg>
