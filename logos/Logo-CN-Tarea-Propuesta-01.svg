<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="2400" viewBox="0 0 2400 2400">
  <defs>
    <radialGradient id="bg01" cx="35%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#363636"/>
      <stop offset="100%" stop-color="#171717"/>
    </radialGradient>
    <linearGradient id="metal01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f7f7f"/>
      <stop offset="40%" stop-color="#505050"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <linearGradient id="orange01" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffa33d"/>
      <stop offset="100%" stop-color="#f36a13"/>
    </linearGradient>
    <filter id="concrete01" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="11" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.42 0 0 0 0 0.42 0 0 0 0 0.42 0 0 0 .18 0" result="grain"/>
      <feBlend in="SourceGraphic" in2="grain" mode="overlay"/>
    </filter>
    <filter id="drop01" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="22" dy="28" stdDeviation="20" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>

  <rect width="2400" height="2400" fill="url(#bg01)" filter="url(#concrete01)"/>

  <g font-family="Montserrat, Arial, sans-serif" filter="url(#drop01)">
    <text x="1290" y="1030" font-size="190" font-weight="800" letter-spacing="10" fill="url(#metal01)">NARVAEZ</text>
    <text x="420" y="1380" font-size="340" font-weight="900" letter-spacing="5" fill="url(#orange01)">CO</text>
    <text x="1350" y="1380" font-size="340" font-weight="900" letter-spacing="5" fill="url(#orange01)">CRETOS</text>

    <g transform="translate(1060 930)">
      <polygon points="120,0 240,190 170,190 170,570 70,570 70,190 0,190" fill="url(#metal01)"/>
      <polygon points="120,225 255,430 180,430 180,820 60,820 60,430 -15,430" fill="url(#orange01)"/>
      <polygon points="120,470 240,660 170,660 170,1040 70,1040 70,660 0,660" fill="url(#metal01)"/>
    </g>
  </g>
</svg>
