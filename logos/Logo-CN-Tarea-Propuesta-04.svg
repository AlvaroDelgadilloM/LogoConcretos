<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048">
  <defs>
    <linearGradient id="bg04" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#303030"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
    <linearGradient id="metal04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9c9c9c"/>
      <stop offset="55%" stop-color="#595959"/>
      <stop offset="100%" stop-color="#232323"/>
    </linearGradient>
    <linearGradient id="orange04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9f36"/>
      <stop offset="100%" stop-color="#f26417"/>
    </linearGradient>
    <filter id="concrete04" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.45" numOctaves="4" seed="22" result="t"/>
      <feColorMatrix in="t" type="matrix" values="0 0 0 0 0.5 0 0 0 0 0.5 0 0 0 0 0.5 0 0 0 .2 0" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="overlay"/>
    </filter>
    <filter id="shadow04" x="-45%" y="-45%" width="190%" height="190%">
      <feDropShadow dx="18" dy="26" stdDeviation="16" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="2048" height="2048" fill="url(#bg04)" filter="url(#concrete04)"/>

  <g font-family="Montserrat, Segoe UI, sans-serif" filter="url(#shadow04)">
    <text x="1058" y="845" font-size="152" font-weight="800" letter-spacing="7" fill="url(#metal04)">NARVAEZ</text>
    <text x="300" y="1150" font-size="292" font-weight="900" letter-spacing="4" fill="url(#orange04)">CO</text>
    <text x="1125" y="1150" font-size="292" font-weight="900" letter-spacing="4" fill="url(#orange04)">CRETOS</text>

    <g transform="translate(845 710)">
      <polygon points="170,5 290,175 215,175 215,475 125,475 125,175 50,175" fill="url(#metal04)"/>
      <polygon points="170,230 300,415 220,415 220,740 120,740 120,415 40,415" fill="url(#orange04)"/>
      <polygon points="170,475 290,645 215,645 215,935 125,935 125,645 50,645" fill="url(#metal04)"/>
    </g>
  </g>
</svg>
